syntax = "proto3";

package chat;
import "google/protobuf/empty.proto";

service ChatService {

  rpc JoinRoom(JoinRoomRequest) returns(google.protobuf.Empty);

  //After Joining a room , gets the history of that room from DB.
  rpc GetHistory(GetHistoryRequest) returns (GetHistoryResponse);

  //Bi-Directional streaming.
  rpc ChatStream(stream ChatEvent) returns (stream ChatEvent);
}

message ChatEvent{
  oneof event{
      ChatMessage message = 1;
      MessageAck ack = 2;
  }
}

message ChatMessage {
  string message_id = 1;
  string username = 2;
  string room_id = 3;
  string content= 4;
  int64 timestamp =5;
}

message MessageAck{
  string message_id = 1;
  string username = 2;
  int64 timestamp = 3;
  bool success = 4;
}

message JoinRoomRequest{
  string username = 1;
  string room_id = 2;
}

message GetHistoryRequest{
  string room_id = 1;
  int64 before_timestamp = 2;
  int32 limit = 3;
}

message GetHistoryResponse{
  repeated ChatMessage messages = 1;
}