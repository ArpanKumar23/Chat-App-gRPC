spring:
  application:
    name: "chat-application"

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/chat_db}
    username: ${DB_USER:local_user}
    password: ${DB_PASSWORD:local_password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update



